name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    env:
      APP_ENV: testing
      APP_KEY: "base64:Rx0L0iv2atWzQoD8jAw//quppKja+IC6pMOcGyNcYFQ="
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: testing
      DB_USERNAME: postgres
      DB_PASSWORD: secret
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: testing
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: { php-version: '8.3', extensions: pdo_pgsql, redis, bcmath }
      - name: Preparar directorios escribibles de Laravel
        working-directory: backend
        run: |
          mkdir -p bootstrap/cache storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs
          chmod -R 0777 bootstrap/cache storage
      - name: Instalar dependencias
        working-directory: backend
        run: composer install --no-interaction --prefer-dist
      - name: Ejecutar pruebas
        working-directory: backend
        run: php artisan test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Instalar, typecheck y build
        working-directory: frontend
        run: |
          npm install
          npm run typecheck
          npm run build
