server {
    listen 8080;
    root /var/www/public;
    index index.php;
    client_max_body_size 20M;

    location / { try_files $uri $uri/ /index.php?$query_string; }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "DENY";
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://maps.gstatic.com https://maps.googleapis.com; script-src 'self' https://maps.googleapis.com; connect-src 'self' https://maps.googleapis.com";
}
