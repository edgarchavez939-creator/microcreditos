name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

env:
  AWS_REGION: us-east-1
  ECR_REPO: microcreditos-api

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_PASSWORD: secret, POSTGRES_DB: testing }
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: { php-version: '8.3', extensions: pdo_pgsql, redis, bcmath }
      - name: Install
        working-directory: backend
        run: composer install --no-interaction --prefer-dist
      - name: Tests
        working-directory: backend
        run: php artisan test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install & typecheck & build
        working-directory: frontend
        run: |
          npm install
          npm run typecheck
          npm run build

  deploy:
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions: { id-token: write, contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - name: Build & push API image
        run: |
          IMG=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
          docker build -f infra/docker/Dockerfile.backend -t $IMG .
          docker push $IMG
      - name: Deploy ECS (rolling)
        run: |
          aws ecs update-service --cluster microcreditos-cluster \
            --service api --force-new-deployment
